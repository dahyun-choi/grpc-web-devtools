<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gRPC-Web DevTools Test Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 10px 20px;
      margin: 10px 5px;
      font-size: 14px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background-color: #0056b3;
    }
    #log {
      margin-top: 20px;
      padding: 10px;
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      min-height: 100px;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-entry {
      padding: 5px;
      margin: 5px 0;
      border-bottom: 1px solid #ddd;
    }
    .log-request {
      color: #0066cc;
    }
    .log-response {
      color: #00aa00;
    }
    .log-error {
      color: #cc0000;
    }
  </style>
</head>
<body>
  <h1>gRPC-Web DevTools Test Page</h1>
  <p>This page simulates gRPC-Web requests for testing the extension.</p>

  <div>
    <button id="sendUnary">Send Unary Request</button>
    <button id="sendError">Send Error Request</button>
    <button id="sendStream">Send Stream Request</button>
    <button id="clearLog">Clear Log</button>
  </div>

  <div id="log"></div>

  <script>
    // Mock gRPC-Web implementation for testing
    const log = document.getElementById('log');
    let requestCounter = 0;

    function addLog(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    // Make devtools hook available
    window.__GRPCWEB_DEVTOOLS__ = function(clients) {
      console.log('[Test Page] gRPC-Web DevTools enabled for', clients.length, 'clients');
      addLog('gRPC-Web DevTools initialized', 'info');

      // Store clients globally for inspection
      window.__grpcClients = clients;
    };

    // Mock gRPC request simulation
    function simulateGrpcRequest(method, request, shouldError = false) {
      requestCounter++;
      const requestId = Math.floor(Math.random() * 1000000);

      console.log(`[Test Page] Simulating ${method}`, { requestId, request });
      addLog(`Request: ${method}`, 'request');

      // Create mock binary data (simulating protobuf-encoded data)
      function createMockGrpcFrame(data) {
        const jsonStr = JSON.stringify(data);
        const encoder = new TextEncoder();
        const messageBytes = encoder.encode(jsonStr);

        // gRPC-Web frame format: [compressed-flag(1)][length(4)][message]
        const frame = new Uint8Array(5 + messageBytes.length);
        frame[0] = 0; // not compressed

        // Big-endian length
        const length = messageBytes.length;
        frame[1] = (length >> 24) & 0xff;
        frame[2] = (length >> 16) & 0xff;
        frame[3] = (length >> 8) & 0xff;
        frame[4] = length & 0xff;

        frame.set(messageBytes, 5);
        return frame;
      }

      // Simulate the gRPC-Web request/response cycle
      const grpcMethod = `http://localhost:8080/${method}`;

      // Dispatch events that the extension interceptor would catch
      window.postMessage({
        type: 'GRPCWEB_DEVTOOLS',
        method: grpcMethod,
        methodType: shouldError ? 'unary' : 'unary',
        requestId: requestId,
        request: request,
        timestamp: Date.now()
      }, '*');

      // Simulate response after a delay
      setTimeout(() => {
        if (shouldError) {
          const error = {
            code: 5,
            message: 'Test error: Resource not found'
          };

          window.postMessage({
            type: 'GRPCWEB_DEVTOOLS',
            method: grpcMethod,
            requestId: requestId,
            error: error,
            timestamp: Date.now()
          }, '*');

          addLog(`Error: ${error.message}`, 'error');
          console.log('[Test Page] Error response', error);
        } else {
          const response = {
            id: `resp-${requestCounter}`,
            msg: `Response to ${method}`,
            timestamp: new Date().toISOString()
          };

          window.postMessage({
            type: 'GRPCWEB_DEVTOOLS',
            method: grpcMethod,
            requestId: requestId,
            response: response,
            timestamp: Date.now()
          }, '*');

          addLog(`Response: ${response.msg}`, 'response');
          console.log('[Test Page] Success response', response);
        }
      }, 100 + Math.random() * 200);
    }

    function simulateStreamRequest(method, count = 3) {
      requestCounter++;
      const requestId = Math.floor(Math.random() * 1000000);

      const request = {
        count: count,
        delay: 100
      };

      const grpcMethod = `http://localhost:8080/${method}`;

      addLog(`Stream Request: ${method}`, 'request');
      console.log(`[Test Page] Simulating stream ${method}`, { requestId, request });

      // Send initial request
      window.postMessage({
        type: 'GRPCWEB_DEVTOOLS',
        method: grpcMethod,
        methodType: 'server_streaming',
        requestId: requestId,
        request: request,
        timestamp: Date.now()
      }, '*');

      // Send multiple stream responses
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const response = {
            index: i,
            time: new Date().toISOString(),
            data: `Stream message ${i + 1} of ${count}`
          };

          window.postMessage({
            type: 'GRPCWEB_DEVTOOLS',
            method: grpcMethod,
            requestId: requestId,
            response: response,
            timestamp: Date.now()
          }, '*');

          addLog(`Stream chunk ${i + 1}/${count}`, 'response');
          console.log('[Test Page] Stream response', response);
        }, (i + 1) * 150);
      }
    }

    // Button event handlers
    document.getElementById('sendUnary').addEventListener('click', () => {
      simulateGrpcRequest('example.ExampleService/ExampleOne', {
        msg: 'Hello from test page!'
      });
    });

    document.getElementById('sendError').addEventListener('click', () => {
      simulateGrpcRequest('example.ExampleService/AlwaysError', {
        msg: 'This will fail'
      }, true);
    });

    document.getElementById('sendStream').addEventListener('click', () => {
      simulateStreamRequest('example.ExampleService/StreamingExample');
    });

    document.getElementById('clearLog').addEventListener('click', () => {
      log.innerHTML = '';
    });

    // Log initial state
    addLog('Test page loaded and ready', 'info');
    console.log('[Test Page] Ready for testing');
  </script>
</body>
</html>
